name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # pnpm-workspace.yaml has Replit-specific settings that may cause issues,
      # so we install only the mobile package deps directly with npm
      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x artifacts/mobile/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mc-kalem-debug.apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
